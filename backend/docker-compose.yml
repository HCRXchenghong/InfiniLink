services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: infinilink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: .
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - "80:8080"
    volumes:
      - ./storage:/app/storage
      - ./static:/app/static

volumes:
  pgdata:
